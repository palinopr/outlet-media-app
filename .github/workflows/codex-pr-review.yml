name: Codex PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Load pull request metadata
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(core.getInput("pr_number", { required: true }));
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput("number", String(pr.number));
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("title", pr.title);
            core.setOutput("body", pr.body || "");

      - name: Check out the PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge

      - name: Pre-fetch base and head refs for the PR
        run: |
          git fetch --no-tags origin \
            ${{ steps.pr.outputs.base_ref }} \
            +refs/pull/${{ steps.pr.outputs.number }}/head

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          model: gpt-5.3-codex
          effort: medium
          prompt: |
            Review only the changes introduced by pull request #${{ steps.pr.outputs.number }} for ${{ github.repository }}.

            Prioritize:
            - correctness bugs
            - regressions
            - security issues
            - missing or weak verification
            - architecture drift against the repo's AGENTS.md

            Be concise and concrete. If there are no findings, say that explicitly.

            Compare against:
              git log --oneline origin/${{ steps.pr.outputs.base_ref }}...FETCH_HEAD

            Pull request title:
            ${{ steps.pr.outputs.title }}

            Pull request body:
            ${{ steps.pr.outputs.body }}

      - name: Post Codex review comment
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });
