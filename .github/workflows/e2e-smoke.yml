name: E2E Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "App URL to smoke test"
        required: true
        default: "https://outletmedia.net"
      client_slug:
        description: "Primary client portal slug with campaign data"
        required: true
        default: "sienna"
      client_slugs:
        description: "Comma-separated client portal slugs for acceptance coverage"
        required: false
        default: "sienna,zamora,kybba,distill_pr,vaz_vil_enterprise,chris_r,proteccion_final,beamina,happy_paws,don_omar_bcn"
      client_member_slugs:
        description: "Comma-separated client slugs for temporary non-admin membership coverage"
        required: false
        default: "sienna,zamora"

jobs:
  authenticated-smoke:
    name: Authenticated Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_BASE_URL: ${{ inputs.base_url }}
      E2E_CLIENT_SLUG: ${{ inputs.client_slug }}
      E2E_CLIENT_SLUGS: ${{ inputs.client_slugs }}
      E2E_CLIENT_MEMBER_SLUGS: ${{ inputs.client_member_slugs }}
      E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: dbznwsnteogovicllean
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.47.2

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run playwright:install

      - name: Verify E2E secret is configured
        run: |
          if [ -z "$E2E_CLERK_SECRET_KEY" ]; then
            echo "Missing E2E_CLERK_SECRET_KEY GitHub secret."
            exit 1
          fi

      - name: Resolve optional Supabase E2E credentials
        run: |
          if [ -n "$E2E_SUPABASE_URL" ] && [ -n "$E2E_SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::add-mask::$E2E_SUPABASE_SERVICE_ROLE_KEY"
            echo "Using explicit Supabase E2E credentials from GitHub secrets."
            exit 0
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured; temporary client-member E2E coverage will be skipped."
            exit 0
          fi

          keys_json="$(supabase projects api-keys --project-ref "$SUPABASE_PROJECT_REF" -o json)"
          service_role_key="$(KEYS_JSON="$keys_json" node -e 'const keys = JSON.parse(process.env.KEYS_JSON || "[]"); const key = keys.find((entry) => entry.name === "service_role")?.api_key; if (!key) process.exit(1); process.stdout.write(key);')"

          echo "::add-mask::$service_role_key"
          echo "E2E_SUPABASE_URL=https://${SUPABASE_PROJECT_REF}.supabase.co" >> "$GITHUB_ENV"
          echo "E2E_SUPABASE_SERVICE_ROLE_KEY=$service_role_key" >> "$GITHUB_ENV"

      - name: Run authenticated smoke
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
