name: Supabase Drift Check

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: "Supabase project ref"
        required: true
        default: "dbznwsnteogovicllean"

jobs:
  dry-run:
    name: Supabase migration dry run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ inputs.project_ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.47.2

      - name: Verify Supabase secrets are configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN GitHub secret."
            exit 1
          fi

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Check migration drift
        run: supabase db push --dry-run
