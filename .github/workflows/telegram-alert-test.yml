name: Telegram Alert Test

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Test alert message"
        required: true
        default: "Outlet Telegram alerts are configured."

jobs:
  send-test-alert:
    name: Send Telegram test alert
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TEST_MESSAGE: ${{ inputs.message }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Verify Telegram secrets
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID GitHub secret."
            exit 1
          fi

      - name: Send Telegram test alert
        run: |
          node <<'NODE'
          const params = new URLSearchParams({
            chat_id: process.env.TELEGRAM_CHAT_ID,
            disable_web_page_preview: 'true',
            text: `✅ ${process.env.TEST_MESSAGE}\nRun: ${process.env.RUN_URL}`.slice(0, 3900),
          });

          const response = await fetch(`https://api.telegram.org/bot${process.env.TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            body: params,
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`Telegram test alert failed (${response.status}): ${text}`);
          }
          NODE
