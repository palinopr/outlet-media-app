name: Supabase Backup Readiness

on:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:
    inputs:
      project_ref:
        description: "Supabase project ref"
        required: true
        default: "dbznwsnteogovicllean"

jobs:
  backups:
    name: List managed backups
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ github.event.inputs.project_ref || 'dbznwsnteogovicllean' }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: 2.47.2

      - name: Verify Supabase access token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN GitHub secret."
            exit 1
          fi

      - name: Confirm managed backups are listable
        run: supabase backups list --project-ref "$SUPABASE_PROJECT_REF"
